<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Karla:wght@800&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="styles/style.css" />
    <title>Password Generator</title>
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Generate a <span>random password</span></h1>
        <p>Never use an insecure password again.</p>
      </header>
      <main>
        <button id="generate-btn" class="generate-btn">
          Generate passwords
        </button>
        <button id="settings-btn" class="settings-btn">
          <img src="images/settings.svg" alt="Settings Icon" />
          Settings
        </button>
      </main>
      <dialog>
        <form method="dialog" id="password-form">
          <div class="input--container__number">
            <label for="length">Length:</label>
            <input
              type="number"
              min="8"
              max="64"
              value="15"
              name="length"
              id="length" />
          </div>
          <div class="input-container__checkbox">
            <input type="checkbox" name="lowercase" id="lowercase" />
            <label for="lowercase">Lowercase</label>
          </div>
          <div class="input-container__checkbox">
            <input type="checkbox" name="uppercase" id="uppercase" />
            <label for="uppercase">Uppercase</label>
          </div>
          <div class="input-container__checkbox">
            <input type="checkbox" name="number" id="number" />
            <label for="number">Number</label>
          </div>
          <div class="input-container__checkbox">
            <input type="checkbox" name="symbol" id="symbol" />
            <label for="symbol">Symbol</label>
          </div>
          <button type="submit">Save</button>
        </form>
      </dialog>

      <footer>
        <output class="output" id="password-1">>nfJjy!dDvR&ial</output>
        <output class="output" class="password-2">
          egxWij@veiPUwKdddddka
        </output>
      </footer>
    </div>
  </body>
</html>
